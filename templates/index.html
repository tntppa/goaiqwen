<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报关单识别 - Ollama {{ model_name }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        #selection-summary {
            display: none;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 600;
            color: #4f8ef7;
        }

        #preview-wrap {
            display: none;
            margin-top: 20px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .file-card {
            border: 1px solid #e5eaf3;
            border-radius: 10px;
            background: #f8faff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 140px;
        }

        .file-thumb {
            height: 90px;
            background: #edf3ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            color: #4f8ef7;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
        }

        .file-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        .file-type-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 56px;
            min-height: 28px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #ffffff;
            border: 1px solid #bfd3ff;
        }

        .file-name {
            padding: 10px;
            font-size: 12px;
            line-height: 1.5;
            color: #1a1a2e;
            word-break: break-all;
            flex: 1;
        }

        .file-card.more-card .file-thumb {
            font-size: 24px;
            font-weight: 700;
        }

        .file-card.more-card .file-name {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #4f8ef7;
            font-weight: 600;
        }
    </style>
</head>
<body>
<aside class="model-info">
    <h2>模型信息</h2>
    <div class="model-info-list">
        <div class="model-info-item"><span>模型名称</span><strong id="mi-model-name">加载中...</strong></div>
        <div class="model-info-item"><span>基础名称</span><strong id="mi-model-base">-</strong></div>
        <div class="model-info-item"><span>版本</span><strong id="mi-model-version">-</strong></div>
        <div class="model-info-item"><span>服务状态</span><strong id="mi-service-status">-</strong></div>
        <div class="model-info-item"><span>Ollama 已注册</span><strong id="mi-registered">-</strong></div>
        <div class="model-info-item"><span>模型精度</span><strong id="mi-precision">-</strong></div>
        <div class="model-info-item"><span>OLLAMA_NUM_GPU</span><strong id="mi-num-gpu">-</strong></div>
        <div class="model-info-item"><span>OLLAMA_FLASH_ATTENTION</span><strong id="mi-flash-attn">-</strong></div>
    </div>

    <div id="mi-note" class="model-info-note">-</div>
</aside>

<div class="container">

    <h1>报关单识别</h1>
    <p class="subtitle">上传文件，由 <strong>{{ model_name }}</strong> 模型提取报关要素</p>



    <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf,.xls,.xlsx,.doc,.docx" multiple>
        <div class="upload-icon">📄</div>
        <p>点击或拖拽多个文件到此处</p>
        <p class="hint">支持 JPG、PNG、PDF、XLS、XLSX、DOC、DOCX 任意组合上传</p>
    </div>

    <div id="selection-summary">已选择 0 个文件</div>

    <div id="preview-wrap">
        <div id="preview-grid" class="preview-grid"></div>
    </div>

    <button class="btn" id="submit-btn" disabled>上传并分析所有文件</button>

    <div id="result-wrap">
        <h3>分析结果 <span id="elapsed-time"></span></h3>
        <div id="result-text"></div>
    </div>
</div>

<aside class="changelog">
    <h2>更新日志</h2>
    <div id="changelog-content">加载中...</div>
</aside>


<script>
    const fileInput = document.getElementById('file-input');
    const uploadArea = document.getElementById('upload-area');
    const selectionSummary = document.getElementById('selection-summary');
    const previewWrap = document.getElementById('preview-wrap');
    const previewGrid = document.getElementById('preview-grid');
    const submitBtn = document.getElementById('submit-btn');
    const resultWrap = document.getElementById('result-wrap');
    const resultText = document.getElementById('result-text');
    const elapsedTime = document.getElementById('elapsed-time');
    const miModelName = document.getElementById('mi-model-name');
    const miModelBase = document.getElementById('mi-model-base');
    const miModelVersion = document.getElementById('mi-model-version');
    const miServiceStatus = document.getElementById('mi-service-status');
    const miRegistered = document.getElementById('mi-registered');
    const miPrecision = document.getElementById('mi-precision');
    const miNumGpu = document.getElementById('mi-num-gpu');
    const miFlashAttn = document.getElementById('mi-flash-attn');
    const miNote = document.getElementById('mi-note');
    const changelogContent = document.getElementById('changelog-content');



    let selectedFiles = [];

    async function loadModelInfo() {
        try {
            const resp = await fetch('/model-info');
            const data = await resp.json();
            miModelName.textContent = data.model_name || '-';
            miModelBase.textContent = data.model_base_name || '-';
            miModelVersion.textContent = data.model_version || '-';
            miServiceStatus.textContent = data.service_status || '-';
            miRegistered.textContent = data.available_in_ollama ? '是' : '否';
            miPrecision.textContent = data.precision_mode || '-';
            miNumGpu.textContent = data.ollama_num_gpu ?? '-';
            miFlashAttn.textContent = data.ollama_flash_attention ?? '-';
            miNote.textContent = data.precision_check_note || data.error || '-';

        } catch (err) {
            miServiceStatus.textContent = 'offline';
            miRegistered.textContent = '-';
            miPrecision.textContent = '-';
            miNumGpu.textContent = '-';
            miFlashAttn.textContent = '-';
            miNote.textContent = '模型信息获取失败，请检查服务状态。';

        }
    }

    function renderChangelog(markdown) {
        const lines = markdown.split(/\r?\n/);
        const fragment = document.createDocumentFragment();
        let currentItem = null;
        let currentList = null;

        lines.forEach((rawLine) => {
            const line = rawLine.trim();
            if (!line || line.startsWith('# ')) {
                return;
            }

            if (line.startsWith('## ')) {
                currentItem = document.createElement('div');
                currentItem.className = 'log-item';

                const title = document.createElement('div');
                title.className = 'log-date';
                title.textContent = line.slice(3).trim();
                currentItem.appendChild(title);

                currentList = document.createElement('ul');
                currentList.className = 'log-desc';
                currentItem.appendChild(currentList);
                fragment.appendChild(currentItem);
                return;
            }

            if (line.startsWith('- ') && currentList) {
                const item = document.createElement('li');
                item.textContent = line.slice(2).trim();
                currentList.appendChild(item);
            }
        });

        changelogContent.innerHTML = '';
        changelogContent.appendChild(fragment);
    }

    async function loadChangelog() {
        try {
            const resp = await fetch('/changelog');
            if (!resp.ok) {
                throw new Error('更新日志加载失败');
            }
            const markdown = await resp.text();
            renderChangelog(markdown);
        } catch (err) {
            changelogContent.innerHTML = '<div class="log-item"><div class="log-date">更新日志</div><ul class="log-desc"><li>更新日志加载失败</li></ul></div>';
        }
    }


    function getExt(name) {

        return name.includes('.') ? name.split('.').pop().toLowerCase() : '';
    }

    function getTypeLabel(file) {
        const ext = getExt(file.name);
        if (['jpg', 'jpeg', 'png'].includes(ext)) {
            return '图片';
        }
        if (ext === 'pdf') {
            return 'PDF';
        }
        if (['xls', 'xlsx'].includes(ext)) {
            return 'Excel';
        }
        if (['doc', 'docx'].includes(ext)) {
            return 'Word';
        }
        return ext ? ext.toUpperCase() : '文件';
    }

    function resetResult() {
        resultWrap.style.display = 'none';
        resultText.textContent = '';
        elapsedTime.textContent = '';
    }

    function createFileCard(file) {
        const card = document.createElement('div');
        card.className = 'file-card';

        const thumb = document.createElement('div');
        thumb.className = 'file-thumb';

        const fileName = document.createElement('div');
        fileName.className = 'file-name';
        fileName.textContent = file.name;

        const ext = getExt(file.name);
        if (['jpg', 'jpeg', 'png'].includes(ext)) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.alt = file.name;
                thumb.innerHTML = '';
                thumb.appendChild(img);
            };
            reader.readAsDataURL(file);
            thumb.textContent = '加载中';
        } else {
            const label = document.createElement('div');
            label.className = 'file-type-label';
            label.textContent = getTypeLabel(file);
            thumb.appendChild(label);
        }

        card.appendChild(thumb);
        card.appendChild(fileName);
        return card;
    }

    function renderFilePreview(files) {
        previewGrid.innerHTML = '';

        if (!files.length) {
            selectionSummary.style.display = 'none';
            previewWrap.style.display = 'none';
            submitBtn.disabled = true;
            return;
        }

        selectionSummary.style.display = 'block';
        selectionSummary.textContent = '已选择 ' + files.length + ' 个文件';
        previewWrap.style.display = 'block';
        submitBtn.disabled = false;

        files.slice(0, 6).forEach((file) => {
            previewGrid.appendChild(createFileCard(file));
        });

        if (files.length > 6) {
            const moreCard = document.createElement('div');
            moreCard.className = 'file-card more-card';
            moreCard.innerHTML = '<div class="file-thumb">+' + (files.length - 6) + '</div><div class="file-name">还有更多文件</div>';
            previewGrid.appendChild(moreCard);
        }
    }

    function setFiles(fileList) {
        selectedFiles = Array.from(fileList || []).filter((file) => file && file.name);
        renderFilePreview(selectedFiles);
        resetResult();
    }

    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', function() {
        uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files.length) {
            setFiles(e.dataTransfer.files);
        }
    });

    fileInput.addEventListener('change', function() {
        if (fileInput.files && fileInput.files.length) {
            setFiles(fileInput.files);
        }
        fileInput.value = '';
    });

    loadModelInfo();
    loadChangelog();

    submitBtn.addEventListener('click', async function() {


        if (!selectedFiles.length) {
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span>处理中，请稍候...';
        resetResult();

        const formData = new FormData();
        // 多文件统一使用同一个 key=file 提交，后端通过 getlist("file") 接收。
        selectedFiles.forEach((file) => {
            formData.append('file', file);
        });

        const t0 = performance.now();
        try {
            const resp = await fetch('/analyze', { method: 'POST', body: formData });
            const data = await resp.json();
            const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
            resultWrap.style.display = 'block';
            const tokenText = data.token_used != null ? ('  本次使用token ' + data.token_used) : '';
            elapsedTime.textContent = '用时 ' + elapsed + ' 秒' + tokenText;

            if (data.error) {

                resultText.innerHTML = '<span class="error">错误：' + data.error + '</span>';
            } else {
                resultText.textContent = data.result;
            }
        } catch (err) {
            const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
            resultWrap.style.display = 'block';
            elapsedTime.textContent = '用时 ' + elapsed + ' 秒';
            resultText.innerHTML = '<span class="error">请求失败，请检查服务是否正常运行。</span>';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '上传并分析所有文件';
        }
    });
</script>
</body>
</html>
